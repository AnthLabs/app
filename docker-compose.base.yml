services:
  mongodb:
    image: mongo:7
    container_name: anth-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    networks:
      - anth-network

  nginx:
    image: nginx:alpine
    container_name: anth-nginx
    restart: unless-stopped

    ports:
      - "${APP_NGINX_PORT:-8080}:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media:/app/media:ro

    networks:
      - anth-network

  key-server:
    build:
      context: ./infra/docker/key-server
    container_name: anth-key-server
    restart: unless-stopped

    environment:
      KEY_ROOT: /run/hls-keys
      KEY_TOKEN_SECRET: ${KEY_TOKEN_SECRET:-replace-with-a-long-random-local-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      KEY_SERVER_PORT: ${KEY_SERVER_PORT:-8090}

    ports:
      - "${KEY_SERVER_PORT:-8090}:${KEY_SERVER_PORT:-8090}"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port=os.environ.get('KEY_SERVER_PORT', '8090'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    volumes:
      - ./media/keys:/run/hls-keys:ro

    networks:
      - anth-network

volumes:
  mongodb_data:

networks:
  anth-network:
    driver: bridge
