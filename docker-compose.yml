services:
  mongodb:
    image: mongo:7
    container_name: anth-mongodb
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    networks:
      - anth-network

  key-server:
    build:
      context: ./infra/docker/key-server
      dockerfile: Dockerfile

    container_name: anth-key-server
    restart: unless-stopped

    environment:
      KEY_ROOT: /run/hls-keys
      KEY_SERVER_PORT: 8090
      KEY_TOKEN_SECRET: ${KEY_TOKEN_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

    volumes:
      - ./media/keys:/run/hls-keys:ro

    networks:
      - anth-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: anth-api
    restart: unless-stopped

    environment:
      MONGO_URI: mongodb://mongodb:27017
      MEDIA_ROOT: /app/media
      HLS_KEY_ROOT: /app/media/keys

      # URLs publiques relatives à l'adresse utilisée par le navigateur.
      PUBLIC_MEDIA_URL: /media
      KEY_SERVER_PUBLIC_URL: /keys

      KEY_TOKEN_SECRET: ${KEY_TOKEN_SECRET}
      KEY_TOKEN_TTL_SECONDS: ${KEY_TOKEN_TTL_SECONDS:-3600}

    volumes:
      - ./media:/app/media

    depends_on:
      - mongodb
      - key-server

    networks:
      - anth-network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile

    container_name: anth-front
    restart: unless-stopped

    depends_on:
      - api

    networks:
      - anth-network

  nginx:
    image: nginx:alpine
    container_name: anth-nginx
    restart: unless-stopped

    ports:
      - "${APP_PORT:-8080}:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media:/app/media:ro

    depends_on:
      - front
      - api
      - key-server

    networks:
      - anth-network

volumes:
  mongodb_data:

networks:
  anth-network:
    driver: bridge
