services:
  infra-nginx:
    image: nginx:alpine
    container_name: vsecure-infra-nginx
    restart: unless-stopped
    ports:
      - "${HLS_CDN_PORT:-8080}:80"
    volumes:
      - ../../media/hls:/app/media/hls:ro
      - ../../media/uploads:/app/media/uploads:ro
      - ../../media/keys:/app/media/keys:ro
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      key-server:
        condition: service_healthy
    networks:
      - vsecure-infra

  key-server:
    build:
      context: ./key-server
    container_name: vsecure-key-server
    restart: unless-stopped
    environment:
      KEY_ROOT: /run/hls-keys
      KEY_TOKEN_SECRET: ${KEY_TOKEN_SECRET:-replace-with-a-long-random-local-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      KEY_SERVER_PORT: ${KEY_SERVER_PORT:-8090}
    ports:
      - "${KEY_SERVER_PORT:-8090}:${KEY_SERVER_PORT:-8090}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port=os.environ.get('KEY_SERVER_PORT', '8090'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - ../../media/keys:/run/hls-keys:ro
    networks:
      - vsecure-infra

networks:
  vsecure-infra:
    name: vsecure-infra
    driver: bridge