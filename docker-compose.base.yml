services:
  mongodb:
    image: mongo:7
    container_name: anth-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    networks:
      - anth-network

  nginx:
    image: nginx:alpine
    container_name: anth-nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media:/app/media:ro

    networks:
      - anth-network

volumes:
  mongodb_data:

networks:
  anth-network:
    driver: bridge
